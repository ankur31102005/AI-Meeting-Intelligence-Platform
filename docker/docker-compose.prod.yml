# =====================================================================
# PRODUCTION stack — the whole platform, frontend included.
#
#   docker compose --env-file .env -f docker/docker-compose.prod.yml up -d --build
#
# Differences from the dev compose (docker/docker-compose.yml):
#   * frontend service is included (dev runs it on the host for hot reload).
#   * NO source bind mounts, NO --reload — the images are immutable artifacts.
#   * restart: unless-stopped on every service (survive crashes/reboots).
#   * resource limits so one runaway container can't starve the host.
#   * infra ports are NOT published to the host (only the reverse-facing
#     frontend + backend are), shrinking the attack surface.
#   * dedicated workers per queue so long transcriptions never block exports.
#
# Put real secrets in .env (never commit it). The backend refuses to boot in
# production with the dev-default SECRET_KEY / DB password.
# =====================================================================

name: meeting-platform-prod

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    <<: *restart
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    <<: *restart
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  minio:
    <<: *restart
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  chromadb:
    <<: *restart
    image: chromadb/chroma:0.6.3
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    <<: *restart
    build:
      context: ../backend
    image: meeting-platform-backend:prod
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    # Only the API is published to the host (behind a reverse proxy in prod).
    ports:
      - "8000:8000"
    # Multiple uvicorn workers for concurrency (no --reload in prod).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g

  # Dedicated worker for the heavy AI queue (scale this one independently).
  worker-ai:
    <<: *restart
    image: meeting-platform-backend:prod
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=INFO --concurrency=2 --queues=ai_pipeline
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Light worker for exports/notifications — never blocked by transcriptions.
  worker-default:
    <<: *restart
    image: meeting-platform-backend:prod
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT_URL: http://minio:9000
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=INFO --concurrency=4 --queues=default
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    <<: *restart
    build:
      context: ../frontend
      args:
        # The URL the BROWSER uses to reach the API (baked at build time).
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    image: meeting-platform-frontend:prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:
