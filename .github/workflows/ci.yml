# =====================================================================
# CI pipeline — runs on every push / PR.
#   backend : lint (ruff) + unit tests (pytest, SQLite-backed, no infra)
#   frontend: lint (eslint) + type-check (tsc) + production build
#   docker  : verify both images build (only on main, to keep PRs fast)
# =====================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r backend/requirements-dev.txt
      - name: Lint
        run: ruff check backend tests
      - name: Unit tests
        run: python -m pytest tests/backend/unit -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1

  docker:
    # Only on main — image builds are slow; PRs are covered by the jobs above.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t meeting-platform-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t meeting-platform-frontend:ci
             --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
             ./frontend
